spring.application.name=commerce-core-kotlin
server.port=${SERVER_PORT:8082}

# =========================================================
# JPA / FLYWAY
# =========================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.sql.init.mode=never
spring.flyway.enabled=true

# =========================================================
# OPENAPI / SWAGGER
# =========================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =========================================================
# CORS
# =========================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# =========================================================
# LOGGING
# =========================================================
logging.file.name=${LOGGING_FILE_NAME:logs/commerce-core.log}
logging.level.com.commercecore=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:WARN}
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LOG_LEVEL:WARN}
logging.level.org.springframework.security.config.annotation.authentication.configuration=ERROR