spring.application.name=commerce-core-kotlin
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5434/commerce_core_db
spring.datasource.username=commerce_user
spring.datasource.password=commerce_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

spring.sql.init.mode=never

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.flyway=DEBUG