spring.application.name=commerce-core-kotlin
server.port=8082

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5434}/${POSTGRES_DB:commerce_core_db}
spring.datasource.username=${POSTGRES_USER:commerce_user}
spring.datasource.password=${POSTGRES_PASSWORD:commerce_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

spring.sql.init.mode=never

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

app.jwt.secret=8f1b5d3c7a9e2f4b6c8d0e1f3a5b7c9d2e4f6a8b0c1d3e5f7a9b2c4d6e8f0a1
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000