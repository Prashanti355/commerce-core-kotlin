# =========================================================
# SERVER
# =========================================================
server.port=${SERVER_PORT:8082}

# =========================================================
# DATABASE - DEV
# =========================================================
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5434}/${POSTGRES_DB:commerce_core_db}
spring.datasource.username=${POSTGRES_USER:commerce_user}
spring.datasource.password=${POSTGRES_PASSWORD:commerce_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================================
# JWT - DEV
# =========================================================
app.jwt.secret=${JWT_SECRET:8f1b5d3c7a9e2f4b6c8d0e1f3a5b7c9d2e4f6a8b0c1d3e5f7a9b2c4d6e8f0a1}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
