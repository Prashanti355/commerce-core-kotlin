# =========================================================
# SERVER
# =========================================================
server.port=${SERVER_PORT:8082}

# =========================================================
# DATABASE - DOCKER
# =========================================================
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:postgres}:${POSTGRES_PORT:5432}/${POSTGRES_DB:commerce_core_db}
spring.datasource.username=${POSTGRES_USER:commerce_user}
spring.datasource.password=${POSTGRES_PASSWORD:commerce_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================================
# JWT - DOCKER
# =========================================================
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

# =========================================================
# LOGGING
# =========================================================
spring.jpa.show-sql=false