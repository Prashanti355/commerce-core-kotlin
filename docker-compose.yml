services:
  db:
    image: postgres:16
    container_name: commerce_core_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: commerce_core_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: